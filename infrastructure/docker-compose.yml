version: "3.9"

services:
  db:
    image: postgres:16
    container_name: slp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_life_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: slp_api
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: